name: 'E2E tests: Stage'
on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled]

  schedule:
    - cron: '0 0 * * *' # This cron expression runs the action every 24 hours at midnight UTC

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-integration-test:
    if: ${{ ! contains(github.event.pull_request.labels.*.name, 'skip-integration-tests') }}
    runs-on:
      - codebuild-content-services-int-repo-${{ github.run_id }}-${{ github.run_attempt }}
      - instance-size:large
      - buildspec-override:true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up sparse checkout
        uses: ./.github/actions/sparse-checkout-utils

      - name: Cache - node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            dist
          key: ${{ runner.os }}-frontend-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-frontend-node-modules-

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Setup Playwright
        run: yarn playwright install chromium --only-shell

      - name: Create .env file
        run: |
          {
            echo "CI=true"
            echo "RBAC=true"
            echo "INTEGRATION=true"
            echo "DOCKER_SOCKET=/var/run/docker.sock"
            echo "RH_CLIENT_PROXY=\"$RH_PROXY_URL\""
          } >> .env 2>/dev/null
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "BASE_URL=https://stage.foo.redhat.com:1337" >> .env
          else
            echo "BASE_URL=$STAGE_BASE_URL" >> .env
            echo "PROXY=$RH_PROXY_URL" >> .env
          fi
          echo "✅ Environment file created successfully"

          if [ -z "$STAGE_PW_CREDENTIALS" ]; then
            echo "Error: STAGE_PW_CREDENTIALS secret is not set."
            exit 1
          fi

          printf '%s' "$STAGE_PW_CREDENTIALS" > creds.json

      - name: Compare .nvmrc files
        id: compare-nvmrc
        run: |
          # Get both .nvmrc files
          curl https://raw.githubusercontent.com/content-services/content-sources-backend/refs/heads/main/_playwright-tests/.nvmrc -o backend-nvmrc
          backendNvmrc="backend-nvmrc"
          frontendNvmrc=".nvmrc"

          # Check if both files exist
          if [ ! -f "$backendNvmrc" ]; then
            echo "Error: $backendNvmrc does not exist."
            exit 1
          fi

          if [ ! -f "$frontendNvmrc" ]; then
            echo "Error: $frontendNvmrc does not exist."
            exit 1
          fi

          # Compare the contents of the two files
          if ! cmp -s "$backendNvmrc" "$frontendNvmrc"; then
            echo "::warning::The .nvmrc files are not the same."
          else
            echo "The .nvmrc versions are the same!"
          fi

      ### Pull request specific steps ###
      # This prevents an error related to minimum watchers when running the front-end and playwright
      - name: Increase file watchers limit
        if: ${{ github.event_name == 'pull_request' }}
        run: echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf && sudo sysctl -p

      - name: Update /etc/hosts
        if: ${{ github.event_name == 'pull_request' }}
        run: sudo npm run patch:hosts

      - name: Build front-end
        if: ${{ github.event_name == 'pull_request' }}
        run: yarn build

      - name: Frontend run (static)
        if: ${{ github.event_name == 'pull_request' }}
        run: yarn fec static --port 8003 &

      - name: Wait for frontend to be ready
        if: ${{ github.event_name == 'pull_request' }}
        timeout-minutes: 3
        run: npx wait-on http://localhost:8003/apps/content-sources/

      - name: Run testing proxy
        if: ${{ github.event_name == 'pull_request' }}
        run: docker run -d --network=host -e HTTPS_PROXY=$RH_PROXY_URL -e ROUTES_JSON_PATH=/config/routes-ci-integration.json -v "$(pwd)/config:/config:ro,Z" --name frontend-development-proxy quay.io/redhat-user-workloads/hcc-platex-services-tenant/frontend-development-proxy:latest
      ### End of pull request specific steps ###

      - name: Run Playwright tests
        run: CURRENTS_PROJECT_ID=jRJFbV CURRENTS_RECORD_KEY=$CURRENTS_RECORD_KEY CURRENTS_CI_BUILD_ID="${{ github.repository }}-${{ github.run_id }}-${{ github.run_attempt }}" yarn playwright test

      - name: Publish Test Report
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: './playwright-ctrf/playwright-ctrf.json'
        if: ${{ !cancelled() }}

      - name: Store report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: ./playwright-ctrf
          retention-days: 10

      - name: Notify Slack on success
        uses: slackapi/slack-github-action@v2.1.1
        if: ${{ success() && github.event_name == 'schedule' && !cancelled() }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "#2EB67D",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/ | :stars: Nightly stage test run>: *SUCCESS* :partymeow:"
                      }
                    }
                  ]
                }
              ]
            }

      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2.1.1
        if: ${{ failure() && github.event_name == 'schedule' && !cancelled() }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "#d72839",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/ | :stars: Nightly stage test run>: *FAILED* :big-sad:"
                      }
                    }
                  ]
                }
              ]
            }
